<!DOCTYPE html>
<html>
<head>
  <title>Events By Yash</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to bottom, black, #111);
      color: white;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      position: sticky;
      top: 0;
      background: rgba(0,0,0,0.9);
    }

    .btn {
      background: gold;
      color: black;
      padding: 10px 20px;
      border-radius: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .hero {
      text-align: center;
      padding: 100px 20px;
      animation: fadeIn 2s ease-in;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(20px);} 
      to {opacity:1; transform: translateY(0);} 
    }

    .section {
      padding: 40px 20px;
      text-align: center;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
      gap: 20px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 20px;
      border-radius: 15px;
      backdrop-filter: blur(10px);
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    .gallery img {
      width: 100%;
      border-radius: 15px;
      height: 150px;
      object-fit: cover;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border-radius: 10px;
      border: none;
    }

    button {
      width: 100%;
      padding: 15px;
      background: gold;
      border: none;
      border-radius: 20px;
      font-weight: bold;
      cursor: pointer;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: gray;
    }
  </style>
</head>

<body>

<div class="header">
  <h2>Events By Yash</h2>
  <a href="#booking" class="btn">Book Now</a>
</div>

<div class="hero">
  <h1>Creating Dream Weddings ✨</h1>
  <p>Luxury Decor • Entry • Full Planning</p>
</div>

<div class="section">
  <h2>Our Services</h2>
  <div class="grid">
    <div class="card">Wedding Decor</div>
    <div class="card">Grand Entry</div>
    <div class="card">Full Planning</div>
  </div>
</div>

<div class="section">
  <h2>Our Work 🔥</h2>
  <div class="grid gallery">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
  </div>
</div>

<div class="section" id="booking">
  <h2>Book Your Event</h2>

  <input placeholder="Your Name">
  <input placeholder="Phone Number">
  <input type="date">
  <input placeholder="Event Location">

  <select>
    <option>Wedding</option>
    <option>Haldi</option>
    <option>Birthday</option>
  </select>

  <textarea placeholder="Your Requirements"></textarea>

  <button onclick="sendWhatsApp()">Submit & Contact</button>
</div>

<footer>
  © 2026 Events By Yash | All Rights Reserved
</footer>

<script>
function sendWhatsApp() {
  window.open("https://wa.me/919289762850");
}
</script>

</body>
</html>
